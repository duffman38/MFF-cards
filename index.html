<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MFF Card Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <!-- Bouton Menu (Flottant) -->
<button class="open-btn" onclick="toggleNav()">☰ Stats & Filtres</button>

<!-- Menu Latéral -->
<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">×</a>
    
    <div class="sidebar-content">
        <h2 style="color: #ffd700; padding: 0 20px;">CALCULATEUR</h2>
        
        <!-- Zone des Stats Totales -->
        <div class="mini-stats-panel">
            <div class="stat-row">
                <span>Attaque Totale:</span>
                <span id="side-total-att" class="val">0%</span>
            </div>
            <div class="stat-row">
                <span>Perforation:</span>
                <span id="side-total-pierce" class="val">0%</span>
            </div>
            <div class="stat-row">
                <span>Recharge:</span>
                <span id="side-total-scd" class="val">0%</span>
            </div>
        </div>

        <hr style="border: 0.5px solid #333; margin: 20px;">

        <h2 style="color: #ffd700; padding: 0 20px;">FILTRES</h2>
        <div class="filter-group">
            <button class="filter-btn" onclick="filterCards('all')">Toutes</button>
            <button class="filter-btn" onclick="filterCards('premium')">Premium Only</button>
        </div>
    </div>
</div>

<!-- Contenu Principal -->
<div id="main">
    <header>
        <h1>MFF Card Simulator</h1>
    </header>

    <!-- Ta section Deck (les 5 slots) -->
    <section class="my-deck-section">
        <div class="deck-slots" id="deck-slots">
            <div class="slot" id="slot-0" onclick="removeCard(0)">+</div>
            <div class="slot" id="slot-1" onclick="removeCard(1)">+</div>
            <div class="slot" id="slot-2" onclick="removeCard(2)">+</div>
            <div class="slot" id="slot-3" onclick="removeCard(3)">+</div>
            <div class="slot" id="slot-4" onclick="removeCard(4)">+</div>
        </div>
    </section>

    <!-- Grille de cartes -->
    <div class="card-container" id="cards-grid"></div>
</div>

 <script>
    // 1. On déclare les variables globales en haut
    let myDeck = [null, null, null, null, null];

    // 2.Ouverture du menu
    let sidebarOpen = false;

        function toggleNav() {
            if (!sidebarOpen) {
                document.getElementById("mySidebar").style.width = "250px";
                document.getElementById("main").style.marginLeft = "250px";
                sidebarOpen = true;
            } else {
                document.getElementById("mySidebar").style.width = "0";
                document.getElementById("main").style.marginLeft= "0";
                sidebarOpen = false;
            }
        }

    // 3. On définit les fonctions de gestion du deck (accessibles partout)
    function addToDeck(nom, image) {
        const emptySlotIndex = myDeck.indexOf(null);
        if (emptySlotIndex !== -1) {
            myDeck[emptySlotIndex] = { nom, image };
            updateDeckUI();
        } else {
            alert("Votre deck est déjà plein ! Retirez une carte d'abord.");
        }
    }

    function removeCard(index) {
        myDeck[index] = null;
        updateDeckUI();
    }

    function updateDeckUI() {
        const slots = document.querySelectorAll('.slot');
        myDeck.forEach((card, index) => {
            if (card) {
                // On ajoute l'image et on garde le clic pour pouvoir la retirer
                slots[index].innerHTML = `<img src="${card.image}" title="${card.nom}" style="width:100%; height:100%; object-fit:cover;">`;
                slots[index].classList.add('active');
            } else {
                slots[index].innerHTML = "+";
                slots[index].classList.remove('active');
            }
        });
    }

    // 4. On charge les données JSON
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('cards-grid');
            
            data.forEach(carte => {
                // Utilisation de backticks ` pour injecter les variables
                const cardHTML = `
                    <div class="card ${carte.type}" onclick="addToDeck('${carte.nom.replace(/'/g, "\\'")}', '${carte.image}')" style="cursor:pointer;">
                        <img src="${carte.image}" alt="${carte.nom}">
                        <h3>${carte.nom}</h3>
                        <p><strong>Stat 1:</strong> ${carte.stat1}</p>
                        <p><strong>Stat 2:</strong> ${carte.stat2}</p>
                        <p><strong>Stat 3:</strong> ${carte.stat3}</p>
                        <span class="tag">${carte.tag}</span>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        })
        .catch(error => console.error("Erreur de chargement :", error));
</script>
</body>
</html>
