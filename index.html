<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MFF Card Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Bouton Menu (Flottant) -->
<button class="open-btn" onclick="toggleNav()">☰ Stats & Filtres</button>

<!-- Menu Latéral -->
<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">×</a>
    
    <div class="sidebar-content">
        <h2 style="color: #ffd700; padding: 0 20px;">CALCULATEUR</h2>
        
        <div class="mini-stats-panel">
            <div class="stat-row">
                <span>Attaque Totale:</span>
                <span id="side-total-att" class="val">0%</span>
            </div>
            <div class="stat-row">
                <span>Perforation:</span>
                <span id="side-total-pierce" class="val">0%</span>
            </div>
            <div class="stat-row">
                <span>Recharge:</span>
                <span id="side-total-scd" class="val">0%</span>
            </div>
        </div>

        <hr style="border: 0.5px solid #333; margin: 20px;">

        <h2 style="color: #ffd700; padding: 0 20px;">FILTRES</h2>
        <div class="filter-group">
            <button class="filter-btn" onclick="filterCards('all')">Toutes</button>
            <button class="filter-btn" onclick="filterCards('premium')">Premium Only</button>
            <button class="filter-btn" onclick="filterCards('normal')">Normales</button>
        </div>
    </div>
</div>

<!-- Contenu Principal -->
<div id="main">
    <header>
        <h1>MFF Card Simulator</h1>
    </header>

    <section class="my-deck-section">
        <div class="deck-slots" id="deck-slots">
            <div class="slot" id="slot-0" onclick="removeCard(0)">+</div>
            <div class="slot" id="slot-1" onclick="removeCard(1)">+</div>
            <div class="slot" id="slot-2" onclick="removeCard(2)">+</div>
            <div class="slot" id="slot-3" onclick="removeCard(3)">+</div>
            <div class="slot" id="slot-4" onclick="removeCard(4)">+</div>
        </div>
    </section>

    <!-- Une seule grille de cartes ici -->
    <div class="card-container" id="cards-grid"></div>
</div>

<script>
    let myDeck = [null, null, null, null, null];
    let toutesLesCartes = []; // On stocke les données du JSON ici

    // 1. Gestion du menu latéral
    let sidebarOpen = false;
    function toggleNav() {
        const sidebar = document.getElementById("mySidebar");
        const main = document.getElementById("main");
        if (!sidebarOpen) {
            sidebar.style.width = "250px";
            main.style.marginLeft = "250px";
            sidebarOpen = true;
        } else {
            sidebar.style.width = "0";
            main.style.marginLeft= "0";
            sidebarOpen = false;
        }
    }

    // 2. Fonction de Filtrage
    function filterCards(type) {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            if (type === 'all') {
                card.style.display = 'block';
            } else {
                // Vérifie si la carte a la classe 'premium' ou 'normal'
                card.style.display = card.classList.contains(type) ? 'block' : 'none';
            }
        });
    }

    // 3. Gestion du Deck
    function addToDeck(index) {
        const emptySlotIndex = myDeck.indexOf(null);
        if (emptySlotIndex !== -1) {
            // On ajoute l'objet complet de la carte au deck
            myDeck[emptySlotIndex] = toutesLesCartes[index];
            updateDeckUI();
        } else {
            alert("Votre deck est déjà plein !");
        }
    }

    function removeCard(index) {
        myDeck[index] = null;
        updateDeckUI();
    }

    function updateDeckUI() {
        const slots = document.querySelectorAll('.slot');
        myDeck.forEach((card, index) => {
            if (card) {
                slots[index].innerHTML = `<img src="${card.image}" title="${card.nom}" style="width:100%; height:100%; object-fit:cover;">`;
                slots[index].classList.add('active');
            } else {
                slots[index].innerHTML = "+";
                slots[index].classList.remove('active');
            }
        });
    }

    // 4. Chargement des données
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            toutesLesCartes = data;
            const container = document.getElementById('cards-grid');
            
            data.forEach((carte, index) => {
                const cardHTML = `
                    <div class="card ${carte.type}" onclick="addToDeck(${index})" style="cursor:pointer;">
                        <img src="${carte.image}" alt="${carte.nom}">
                        <h3>${carte.nom}</h3>
                        <p><strong>Fixe 1:</strong> ${carte.stats_fixes[0].nom}</p>
                        <p><strong>Fixe 2:</strong> ${carte.stats_fixes[1].nom}</p>
                        <span class="tag">${carte.tag}</span>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        })
        .catch(error => console.error("Erreur :", error));
</script>
</body>
</html>
